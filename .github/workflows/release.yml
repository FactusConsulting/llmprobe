name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  APP_NAME: llmprobe
  PROJECT_PATH: src/llmprobe/llmprobe.csproj

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-latest
          - target: osx-x64
            os: macos-latest
          - target: osx-arm64
            os: macos-latest
          - target: win-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Derive version (tag drives version, otherwise dev+sha)
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="0.0.0-dev.$(git rev-parse --short HEAD)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building with version: $v"

      - name: Test (unit only, skip integration)
        if: matrix.target == 'linux-x64' || matrix.target == 'win-x64'
        run: dotnet test tests/${{ env.APP_NAME }}.Tests/${{ env.APP_NAME }}.Tests.csproj -c Release --filter "Category!=Integration" --logger "console;verbosity=normal"
        shell: bash

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }} -r ${{ matrix.target }}

      - name: Publish (single-file, self-contained)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r ${{ matrix.target }} \
            --self-contained \
            -p:Version=${{ steps.ver.outputs.version }} \
            -p:InformationalVersion=${{ steps.ver.outputs.version }} \
            -p:PublishSingleFile=true \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -o publish/${{ matrix.target }}
        shell: bash

      - name: Package (tar.gz on Unix)
        if: matrix.target != 'win-x64'
        run: |
          cd publish/${{ matrix.target }}
          tar -czf ../../${{ env.APP_NAME }}-${{ matrix.target }}.tar.gz ${{ env.APP_NAME }}
        shell: bash

      - name: Package (zip on Windows)
        if: matrix.target == 'win-x64'
        run: |
          cd publish/${{ matrix.target }}
          7z a ../../${{ env.APP_NAME }}-${{ matrix.target }}.zip ${{ env.APP_NAME }}.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.target }}
          path: |
            ${{ env.APP_NAME }}-${{ matrix.target }}.tar.gz
            ${{ env.APP_NAME }}-${{ matrix.target }}.zip
          if-no-files-found: ignore

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
